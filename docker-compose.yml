services:
  postgres:
    image: postgres:17-alpine
    container_name: typesync-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: typesync
      POSTGRES_PASSWORD: typesync_dev
      POSTGRES_DB: typesync
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
