<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background Gradient: Rich, warm charcoal -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1c19" />
      <stop offset="100%" stop-color="#0f0e0d" />
    </linearGradient>
    
    <!-- Symbol Gradient: Glowing peach/gold to brand terracotta -->
    <linearGradient id="symbol-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd5a3" />
      <stop offset="40%" stop-color="#db7258" />
      <stop offset="100%" stop-color="#c2593f" />
    </linearGradient>
  </defs>
  
  <!-- Rounded Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg-grad)" />
  
  <!-- Subtle inner border for premium app-icon feel -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="#f2ede4" stroke-opacity="0.08" />
  
  <!-- Cursor Line (Caret) -->
  <rect x="11.5" y="8" width="2.5" height="16" rx="1.25" fill="url(#symbol-grad)" />
  
  <!-- Spark / Star (Beziers) -->
  <path d="M 19.5,6.5 Q 19.5,11.5 24.5,11.5 Q 19.5,11.5 19.5,16.5 Q 19.5,11.5 14.5,11.5 Q 19.5,11.5 19.5,6.5 Z" fill="url(#symbol-grad)" />
</svg>
